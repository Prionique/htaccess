<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EternalAI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fff;
    --surface: #f7f7f7;
    --border: #e8e8e8;
    --text: #111;
    --muted: #888;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .badge {
    font-size: 12px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 99px;
    padding: 4px 10px;
    color: var(--muted);
  }
  .badge strong { color: var(--text); font-weight: 500; }

  .icon-btn {
    width: 34px; height: 34px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    color: var(--text);
    transition: background 0.1s;
  }
  .icon-btn:active { background: var(--surface); }

  main { padding: 20px; max-width: 600px; margin: 0 auto; }

  .key-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 24px;
  }
  .key-val {
    flex: 1;
    font-size: 12px;
    font-family: monospace;
    color: var(--muted);
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .text-btn {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.1s;
  }
  .text-btn:active { background: var(--surface); }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

.effects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

 



  .effect-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    box-sizing: border-box;
     width: 100%;
     aspect-ration: 1/1!important;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .effect-card:active { background: #efefef; }
  .effect-card.active {
    border: 1.5px solid var(--text);
    background: var(--bg);
  }
  .effect-image {
     width: 100%;
  
    height:100%;
    aspect-ratio: 1/1
  }
  .effect-card img {
    width: 100%;
  
    height:100%;
    aspect-ratio: 1/1 !important;
    object-fit: cover;
    border-radius: 6px;
    display: block;
    /* display: none; */
    margin-top: 8px;
    background: var(--border);
  }
  .effect-name {
    font-size: 12px;
    width: fit-content;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .effect-price { font-size: 11px; color: var(--muted);  width: fit-content;}

  .skel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    height: 140px;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
  }

  .upload-zone {
    border: 0.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 28px;
    position: relative;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .upload-zone:active { background: var(--surface); }
  .upload-zone input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 22px; margin-bottom: 6px; display: block; }
  .upload-preview {
    width: 100%; max-height: 220px; object-fit: cover;
    border-radius: 8px; margin-top: 14px; display: none;
  }

  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--text);
    color: var(--bg);
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity 0.15s;
    margin-bottom: 16px;
    letter-spacing: -0.2px;
  }
  .generate-btn:active { opacity: 0.8; }
  .generate-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 20px;
    min-height: 18px;
  }

  .result-wrap { margin-bottom: 40px; }
  .result-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }
  .result-img {
    width: 100%;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    display: block;
  }
</style>
</head>
<body>

<header>
  <span class="logo">EternalAI</span>
  <div class="header-right">
    <span class="badge">⬡ <strong id="balance">...</strong></span>
    <button class="icon-btn" onclick="claimDaily()" title="Claim daily">🎁</button>
  </div>
</header>

<main>
  <div class="key-row">
    <span class="key-val" id="apiKeyDisplay">No key set</span>
    <button class="text-btn" onclick="changeApiKey()">Change key</button>
  </div>

  <div class="label">Effects</div>
  <div id="effects" class="effects-grid">
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
  </div>

  <div class="label">Image</div>
  <div class="upload-zone">
    <input type="file" id="fileInput" accept="image/*" />
    <span class="upload-icon">↑</span>
    <span id="uploadLabel">Tap to upload a photo</span>
    <img id="uploadPreview" class="upload-preview" />
  </div>

  <button class="generate-btn" onclick="generate()" id="genBtn">Generate</button>

  <div class="status" id="statusText"></div>

  <div id="result"></div>
</main>

<script>
let API_KEY = null;
let selectedEffect = null;
let base64Image = null;

function initApiKey() {
  const saved = localStorage.getItem("eternal_api_key");
  if (!saved) {
    const key = prompt("Enter your EternalAI API Key:");
    if (!key) return;
    localStorage.setItem("eternal_api_key", key);
    API_KEY = key;
  } else {
    API_KEY = saved;
  }
  updateKeyDisplay();
  loadBalance();
}

function updateKeyDisplay() {
  if (!API_KEY) return;
  document.getElementById("apiKeyDisplay").textContent =
    API_KEY.slice(0, 6) + "···" + API_KEY.slice(-4);
}

function changeApiKey() {
  const key = prompt("Enter new API key:");
  if (!key) return;
  localStorage.setItem("eternal_api_key", key);
  API_KEY = key;
  updateKeyDisplay();
  loadBalance();
}

async function loadBalance() {
  if (!API_KEY) return;
  try {
    const res = await fetch("https://open.eternalai.org/v1/balance", {
      headers: { "x-api-key": API_KEY }
    });
    const data = await res.json();
    document.getElementById("balance").textContent = data.diamond_balance ?? "—";
  } catch {
    document.getElementById("balance").textContent = "err";
  }
}

async function claimDaily() {
  try {
    await fetch("https://agent.api.eternalai.org/api/feed/data/checkin/daily", {
      method: "POST", credentials: "include"
    });
    alert("Daily reward claimed!");
  } catch {
    alert("Failed — must be logged in.");
  }
}

async function loadEffects() {
  try {
    const res = await fetch("https://open.eternalai.org/creative-ai/effects?effect_type=image");
    const data = await res.json();
    const effects = data.effects || data.data || data;
    const container = document.getElementById("effects");
    container.innerHTML = "";
    effects.forEach(effect => {
      const card = document.createElement("div");
      card.className = "effect-card";
      card.innerHTML = `
        <div class="effect-name">${effect.effect_id.slice(0,10)}</div>
        <div class="effect-price">⬡ ${effect.price}</div>
        <div class="effect-image">
        ${effect.sampleOutputURL ? `<img src="${effect.sampleOutputURL}" loading="lazy" />
        </div>` : ""}
      `;
      card.onclick = () => {
        document.querySelectorAll(".effect-card").forEach(c => c.classList.remove("active"));
        card.classList.add("active");
        selectedEffect = effect.effect_id;
      };
      container.appendChild(card);
    });
  } catch {
    document.getElementById("effects").innerHTML =
      '<p style="font-size:13px;color:var(--muted);grid-column:1/-1;">Could not load effects.</p>';
  }
}

document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    base64Image = reader.result;
    const preview = document.getElementById("uploadPreview");
    preview.src = base64Image;
    preview.style.display = "block";
    document.getElementById("uploadLabel").textContent = file.name;
  };
  reader.readAsDataURL(file);
});

async function generate() {
  if (!selectedEffect) return alert("Select an effect first.");
  if (!base64Image) return alert("Upload an image first.");
  const btn = document.getElementById("genBtn");
  const status = document.getElementById("statusText");
  btn.disabled = true;
  btn.textContent = "Sending…";
  status.textContent = "";
  try {
    const res = await fetch("https://open.eternalai.org/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": API_KEY },
      body: JSON.stringify({ images: [base64Image], effect_id: selectedEffect })
    });
    const data = await res.json();
    if (!data.request_id) {
      alert("Error: no request ID returned.");
      btn.disabled = false; btn.textContent = "Generate";
      return;
    }
    pollResult(data.request_id);
  } catch {
    status.textContent = "Request failed.";
    btn.disabled = false; btn.textContent = "Generate";
  }
}

function pollResult(id) {
  const status = document.getElementById("statusText");
  const btn = document.getElementById("genBtn");
  btn.textContent = "Processing…";
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`https://open.eternalai.org/poll-result/${id}`);
      const data = await res.json();
      status.textContent = `${data.status} — ${data.progress || 0}%`;
      if (data.status === "success") {
        clearInterval(interval);
        status.textContent = "Done.";
        btn.disabled = false; btn.textContent = "Generate";
        const url = data.result_url || data.result;
        document.getElementById("result").innerHTML = `
          <div class="result-wrap">
            <div class="result-label">Result</div>
            <img class="result-img" src="${url}" />
          </div>`;
        loadBalance();
      }
      if (data.status === "failed") {
        clearInterval(interval);
        status.textContent = "Generation failed.";
        btn.disabled = false; btn.textContent = "Generate";
      }
    } catch {
      clearInterval(interval);
      status.textContent = "Polling error.";
      btn.disabled = false; btn.textContent = "Generate";
    }
  }, 3000);
}

initApiKey();
loadEffects();
</script>
</body>
</html>
